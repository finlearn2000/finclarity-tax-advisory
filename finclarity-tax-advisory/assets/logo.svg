<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="400" height="400" fill="#ffffff" rx="200"/>

  <!-- Outer Circle -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="#0A1C3A" stroke-width="12" />

  <!-- Shield Outline - Left Half (Navy Blue) -->
  <path d="M 200 85 Q 160 90, 135 102 Q 130 155, 135 185 Q 140 225, 200 255" 
        fill="none" stroke="#0A1C3A" stroke-width="10" stroke-linecap="round" />

  <!-- Shield Outline - Right Half (Gold) -->
  <path d="M 200 85 Q 240 90, 265 102 Q 270 155, 265 185 Q 260 225, 200 255" 
        fill="none" stroke="#C49B37" stroke-width="10" stroke-linecap="round" />

  <!-- Arrow - Left Half (Navy Blue) -->
  <path d="M 200 115 L 165 160 L 187 160 L 187 230 L 200 230 Z" fill="#0A1C3A" />

  <!-- Arrow - Right Half (Gold) -->
  <path d="M 200 115 L 235 160 L 213 160 L 213 230 L 200 230 Z" fill="#C49B37" />

  <!-- White Rupee Symbol (₹) -->
  <text x="200" y="190" font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="28" fill="#ffffff" text-anchor="middle">₹</text>

  <!-- FINCLARITY Text -->
  <text x="200" y="325" font-family="'Outfit', 'Inter', sans-serif" font-weight="800" font-size="38" fill="#0A1C3A" text-anchor="middle" letter-spacing="3">FINCLARITY</text>
</svg>
